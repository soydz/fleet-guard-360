server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy reverso: /api -> apiGateway
    # El frontend llama a /api/auth/login
    # Nginx lo reenvía a http://apiGateway:8080/auth/login
    location /api/ {
        proxy_pass http://apiGateway:8080/;
        proxy_set_header Host $host;
    }

    # Proxy WebSocket para notificaciones
    # El frontend se conecta a /notifications (WebSocket)
    # Nginx hace upgrade a WebSocket y lo reenvía al apiGateway
    location /notifications/ {
        proxy_pass http://apiGateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ─── SPA: todas las rutas van a index.html ───
    # Si alguien entra a /dashboard, Nginx intenta servir
    # /dashboard (no existe), /dashboard/index.html (no existe),
    # y finalmente cae a /index.html (React la maneja)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
